<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nimlo Start</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }

    main {
      max-width: 36rem;
      padding: 2rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
      font-weight: 650;
    }

    p {
      margin: 0;
      color: color-mix(in srgb, CanvasText 70%, Canvas);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Nimlo</h1>
    <p>Milestone 0.1 start page. WebView is running; browser chrome comes next.</p>
  </main>
</body>
</html>
